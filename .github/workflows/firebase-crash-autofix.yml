name: Firebase Crash Auto-Fix

on:
  schedule:
    - cron: "*/30 * * * *"

  workflow_dispatch:
    inputs:
      crash_issue_id:
        description: "Optional Crashlytics Issue ID override"
        required: false
        type: string
      crash_title:
        description: "Optional crash title override (used if BigQuery is unavailable)"
        required: false
        type: string
      crash_stacktrace:
        description: "Optional stacktrace override (used if BigQuery is unavailable)"
        required: false
        type: string

  repository_dispatch:
    types: [firebase-crash-detected]

permissions:
  actions: read
  contents: write
  id-token: write
  pull-requests: write

env:
  BASE_BRANCH: main
  GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
  FIREBASE_PROJECT_ID: ugitai

jobs:
  auto-fix:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout base branch
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ env.BASE_BRANCH }}

      - name: Determine crash scan window (last run -> now)
        id: window
        uses: actions/github-script@v7
        with:
          script: |
            const workflowId = "firebase-crash-autofix.yml";
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              per_page: 100,
            });

            const prev = runs
              .filter((r) => r.id !== context.runId && r.status === "completed")
              .sort((a, b) => {
                const ta = new Date(a.updated_at || a.run_started_at || a.created_at).getTime();
                const tb = new Date(b.updated_at || b.run_started_at || b.created_at).getTime();
                return tb - ta;
              })[0];

            const endIso = new Date().toISOString();
            const startIso = prev
              ? (prev.updated_at || prev.run_started_at || prev.created_at)
              : new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();

            core.info(`Window start: ${startIso}`);
            core.info(`Window end:   ${endIso}`);
            core.setOutput("start", startIso);
            core.setOutput("end", endIso);

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install Python dependencies
        run: pip install anthropic google-auth google-cloud-bigquery requests

      - name: Authenticate to Google Cloud (OIDC)
        if: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER != '' && vars.GCP_SERVICE_ACCOUNT_EMAIL != '' }}
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WORKLOAD_IDENTITY_PROVIDER }}
          service_account: ${{ vars.GCP_SERVICE_ACCOUNT_EMAIL }}

      - name: Resolve issue id
        id: crash
        env:
          WINDOW_START_ISO: ${{ steps.window.outputs.start }}
          WINDOW_END_ISO: ${{ steps.window.outputs.end }}
        run: |
          if [ "${{ github.event_name }}" = "repository_dispatch" ] && [ -n "${{ github.event.client_payload.issue_id }}" ]; then
            ISSUE_ID="${{ github.event.client_payload.issue_id }}"
          elif [ -n "${{ inputs.crash_issue_id }}" ]; then
            ISSUE_ID="${{ inputs.crash_issue_id }}"
          else
            python .github/scripts/select_top_issue.py || true
            ISSUE_ID="$(cat selected_issue_id.txt 2>/dev/null || true)"
          fi

          if [ -z "$ISSUE_ID" ]; then
            echo "no_issue=true" >> "$GITHUB_OUTPUT"
            echo "No Crashlytics issue found in the selected window."
            exit 0
          fi

          SAFE_ID=$(echo "$ISSUE_ID" | tr -dc 'a-zA-Z0-9-' | head -c 40)
          echo "issue_id=$ISSUE_ID" >> "$GITHUB_OUTPUT"
          echo "branch=fix/firebase-crash-${SAFE_ID}-$(date +%s)" >> "$GITHUB_OUTPUT"

      - name: Create fix branch
        if: steps.crash.outputs.no_issue != 'true'
        run: git checkout -b "${{ steps.crash.outputs.branch }}"

      - name: Fetch crash details
        if: steps.crash.outputs.no_issue != 'true'
        env:
          CRASH_ISSUE_ID: ${{ steps.crash.outputs.issue_id }}
          MANUAL_CRASH_TITLE: ${{ inputs.crash_title }}
          MANUAL_CRASH_STACKTRACE: ${{ inputs.crash_stacktrace }}
          ALLOW_MISSING_CRASH_DETAILS: "true"
        run: python .github/scripts/fetch_crash_details.py

      - name: Analyze and fix with Claude
        if: steps.crash.outputs.no_issue != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CRASH_ISSUE_ID: ${{ steps.crash.outputs.issue_id }}
        run: python .github/scripts/fix_with_claude.py

      - name: Verify build
        id: build
        if: steps.crash.outputs.no_issue != 'true'
        continue-on-error: true
        run: |
          chmod +x gradlew
          ./gradlew :app:compileDebugKotlin --no-daemon

      - name: Commit changes
        id: commit
        if: steps.crash.outputs.no_issue != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --staged --quiet; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            echo "No code changes generated for this issue."
          else
            TITLE=$(cat crash_title.txt 2>/dev/null || echo "${{ steps.crash.outputs.issue_id }}")
            git commit -m "fix: Crashlytics ${{ steps.crash.outputs.issue_id }} - ${TITLE}"
          fi

      - name: Push branch
        if: steps.crash.outputs.no_issue != 'true' && steps.commit.outputs.no_changes != 'true'
        run: git push origin "${{ steps.crash.outputs.branch }}"

      - name: Create Pull Request
        if: steps.crash.outputs.no_issue != 'true' && steps.commit.outputs.no_changes != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE=$(cat crash_title.txt 2>/dev/null || echo "${{ steps.crash.outputs.issue_id }}")
          SUMMARY=$(cat fix_summary.md 2>/dev/null || echo "_No summary generated._")
          STACKTRACE=$(cat crash_stacktrace.txt 2>/dev/null || echo "_No stacktrace available._")

          BUILD_STATUS="✅ compile passed"
          if [ "${{ steps.build.outcome }}" != "success" ]; then
            BUILD_STATUS="⚠️ compile failed (manual review required)"
          fi

          {
            echo "## Firebase Crash Auto-Fix"
            echo
            echo "**Firebase Issue ID:** \`${{ steps.crash.outputs.issue_id }}\`"
            echo "**Crash:** ${TITLE}"
            echo "**Base branch:** \`${{ env.BASE_BRANCH }}\`"
            echo "**Build:** ${BUILD_STATUS}"
            echo
            echo "### Stacktrace"
            echo '```'
            echo "$STACKTRACE"
            echo '```'
            echo
            echo "### Claude Analysis"
            echo "$SUMMARY"
            echo
            echo "Firebase Issue ID: ${{ steps.crash.outputs.issue_id }}"
          } > pr_body.md

          gh pr create \
            --title "fix: Firebase crash - ${TITLE}" \
            --base "${{ env.BASE_BRANCH }}" \
            --head "${{ steps.crash.outputs.branch }}" \
            --body-file pr_body.md
