# Firebase Crash Auto-Fix Pipeline
#
# Triggers:
#   1. Manual (workflow_dispatch): paste crash details directly in GitHub UI
#   2. Webhook (repository_dispatch): send a POST to the GitHub API from a
#      Firebase Alert webhook relay (Cloud Function / Zapier / etc.)
#
# Required secrets:
#   ANTHROPIC_API_KEY  — Claude API key
#   GITHUB_TOKEN       — automatically provided by GitHub Actions
#
# Firebase webhook relay payload shape (repository_dispatch):
#   {
#     "event_type": "firebase-crash-detected",
#     "client_payload": {
#       "issue_id":    "abc123",
#       "title":       "NullPointerException in MainActivity.kt",
#       "stacktrace":  "Fatal Exception: java.lang.NullPointerException\n  at ...",
#       "base_branch": "main"          ← optional, defaults to main
#     }
#   }

name: Firebase Crash Auto-Fix

on:
  workflow_dispatch:
    inputs:
      crash_issue_id:
        description: "Firebase Crashlytics Issue ID"
        required: true
        type: string
      crash_title:
        description: "Crash title / exception class"
        required: true
        type: string
      crash_stacktrace:
        description: "Full crash stacktrace"
        required: true
        type: string
      base_branch:
        description: "Base branch to branch from and target for the PR"
        required: false
        default: "main"
        type: string

  repository_dispatch:
    types: [firebase-crash-detected]

permissions:
  contents: write
  pull-requests: write

jobs:
  auto-fix:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout base branch ───────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: >-
            ${{
              github.event_name == 'repository_dispatch'
                && (github.event.client_payload.base_branch || 'main')
                || (inputs.base_branch || 'main')
            }}

      # ── 2. Normalise crash inputs ─────────────────────────────────────────
      - name: Resolve crash inputs
        id: crash
        env:
          # Use env vars for potentially multiline / special-char content
          ST_DISPATCH: ${{ github.event.client_payload.stacktrace }}
          ST_INPUT: ${{ inputs.crash_stacktrace }}
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            ISSUE_ID="${{ github.event.client_payload.issue_id }}"
            TITLE="${{ github.event.client_payload.title }}"
            BASE="${{ github.event.client_payload.base_branch }}"
            printf '%s' "$ST_DISPATCH" > crash_stacktrace.txt
          else
            ISSUE_ID="${{ inputs.crash_issue_id }}"
            TITLE="${{ inputs.crash_title }}"
            BASE="${{ inputs.base_branch }}"
            printf '%s' "$ST_INPUT" > crash_stacktrace.txt
          fi

          echo "issue_id=$ISSUE_ID"               >> "$GITHUB_OUTPUT"
          echo "title=$TITLE"                      >> "$GITHUB_OUTPUT"
          echo "base_branch=${BASE:-main}"          >> "$GITHUB_OUTPUT"

          SAFE_ID=$(echo "$ISSUE_ID" | tr -dc 'a-zA-Z0-9-' | head -c 40)
          echo "branch=fix/firebase-crash-${SAFE_ID}-$(date +%s)" >> "$GITHUB_OUTPUT"

      # ── 3. Create fix branch ──────────────────────────────────────────────
      - name: Create fix branch
        run: git checkout -b "${{ steps.crash.outputs.branch }}"

      # ── 4. Python + Claude ────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic

      - name: Analyze crash and apply fix with Claude
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CRASH_ISSUE_ID: ${{ steps.crash.outputs.issue_id }}
          CRASH_TITLE: ${{ steps.crash.outputs.title }}
        run: python .github/scripts/fix_crash.py

      # ── 5. Verify the fix compiles ────────────────────────────────────────
      - name: Verify build compiles
        id: build
        continue-on-error: true
        run: |
          chmod +x gradlew
          ./gradlew :app:compileDebugKotlin --no-daemon 2>&1 | tail -10

      # ── 6. Commit ─────────────────────────────────────────────────────────
      - name: Commit fix
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --staged --quiet; then
            echo "NO_CHANGES=true" >> "$GITHUB_ENV"
            echo "⚠️  Claude found no code changes to apply."
          else
            COMMIT_MSG=$(printf 'fix: resolve Firebase crash %s\n\n%s\n\nAuto-analyzed and fixed by Claude AI.\nFirebase Issue ID: %s' \
              "${{ steps.crash.outputs.issue_id }}" \
              "${{ steps.crash.outputs.title }}" \
              "${{ steps.crash.outputs.issue_id }}")
            git commit -m "$COMMIT_MSG"
          fi

      # ── 7. Push branch ────────────────────────────────────────────────────
      - name: Push branch
        if: env.NO_CHANGES != 'true'
        run: git push origin "${{ steps.crash.outputs.branch }}"

      # ── 8. Open Pull Request ──────────────────────────────────────────────
      - name: Create Pull Request
        if: env.NO_CHANGES != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BUILD_BADGE="✅ Compiles successfully"
          if [ "${{ steps.build.outcome }}" != "success" ]; then
            BUILD_BADGE="⚠️ Build check failed — manual review required before merging"
          fi

          SUMMARY=$(cat fix_summary.md 2>/dev/null || echo "_No summary generated._")
          STACKTRACE=$(cat crash_stacktrace.txt)

          gh pr create \
            --title "fix: Firebase crash — ${{ steps.crash.outputs.title }}" \
            --base "${{ steps.crash.outputs.base_branch }}" \
            --head "${{ steps.crash.outputs.branch }}" \
            --body "## 🔥 Firebase Crash Auto-Fix

| Field | Value |
|---|---|
| **Firebase Issue ID** | \`${{ steps.crash.outputs.issue_id }}\` |
| **Crash** | ${{ steps.crash.outputs.title }} |
| **Base branch** | \`${{ steps.crash.outputs.base_branch }}\` |
| **Build** | ${BUILD_BADGE} |

---

### Stacktrace
\`\`\`
${STACKTRACE}
\`\`\`

---

### Claude's Analysis & Fix
${SUMMARY}

---

🤖 Auto-generated by [Claude](https://claude.ai) via GitHub Actions"
