# Firebase Crash Auto-Fix Pipeline
#
# Triggers:
#   1. Scheduled auto-run (schedule) — auto-detects top issue from previous run -> now
#   2. Manual          (workflow_dispatch)  — optional issue_id override
#   3. Webhook         (repository_dispatch) — Firebase Alert relay sends only issue_id
#
# Everything else (title, stacktrace, base branch) is resolved automatically:
#   • title + stacktrace  → fetched from Firebase Crashlytics REST API
#   • top issue id        → auto-selected from previous run window when no issue_id provided
#   • base branch         → always "main"
#
# Required secrets:
#   ANTHROPIC_API_KEY            — Claude API key
#   GOOGLE_SERVICE_ACCOUNT_JSON  — GCP service account with Firebase Crashlytics Viewer role
#   GITHUB_TOKEN                 — provided automatically by GitHub Actions
#
# Firebase webhook relay payload (repository_dispatch):
#   POST https://api.github.com/repos/uditkumarroy/UGitAi/dispatches
#   { "event_type": "firebase-crash-detected", "client_payload": { "issue_id": "abc123" } }

name: Firebase Crash Auto-Fix

on:
  schedule:
    - cron: "*/30 * * * *"

  workflow_dispatch:
    inputs:
      crash_issue_id:
        description: "Firebase Crashlytics Issue ID"
        required: false
        type: string

  repository_dispatch:
    types: [firebase-crash-detected]

permissions:
  actions: read
  contents: write
  pull-requests: write

env:
  BASE_BRANCH: main

jobs:
  auto-fix:
    runs-on: ubuntu-latest

    steps:
      # ── 1. Checkout main ──────────────────────────────────────────────────
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: main

      # ── 2. Determine previous-run window ──────────────────────────────────
      - name: Determine window (last run → now)
        id: window
        uses: actions/github-script@v7
        with:
          script: |
            const workflowId = "firebase-crash-autofix.yml";
            const runs = await github.paginate(github.rest.actions.listWorkflowRuns, {
              owner: context.repo.owner,
              repo: context.repo.repo,
              workflow_id: workflowId,
              per_page: 100,
            });

            const prev = runs
              .filter((r) => r.id !== context.runId && r.status === "completed")
              .sort((a, b) => {
                const ta = new Date(a.updated_at || a.run_started_at || a.created_at).getTime();
                const tb = new Date(b.updated_at || b.run_started_at || b.created_at).getTime();
                return tb - ta;
              })[0];

            const nowIso = new Date().toISOString();
            const startIso = prev
              ? (prev.updated_at || prev.run_started_at || prev.created_at)
              : new Date(Date.now() - 24 * 60 * 60 * 1000).toISOString();

            core.info(`Window start: ${startIso}`);
            core.info(`Window end:   ${nowIso}`);
            core.setOutput("start", startIso);
            core.setOutput("end", nowIso);

      # ── 3. Set up Python ──────────────────────────────────────────────────
      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install dependencies
        run: pip install anthropic google-auth requests

      # ── 4. Resolve Issue ID (manual/webhook override OR auto-detect) ─────
      - name: Resolve Issue ID
        id: crash
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          WINDOW_START_ISO: ${{ steps.window.outputs.start }}
          WINDOW_END_ISO: ${{ steps.window.outputs.end }}
        run: |
          if [ "${{ github.event_name }}" == "repository_dispatch" ]; then
            ISSUE_ID="${{ github.event.client_payload.issue_id }}"
          elif [ -n "${{ inputs.crash_issue_id }}" ]; then
            ISSUE_ID="${{ inputs.crash_issue_id }}"
          else
            python .github/scripts/select_top_issue.py
            ISSUE_ID="$(cat selected_issue_id.txt 2>/dev/null || true)"
          fi

          if [ -z "$ISSUE_ID" ]; then
            echo "no_issue=true" >> "$GITHUB_OUTPUT"
            echo "No Crashlytics issue found in detection window."
            exit 0
          fi

          echo "issue_id=$ISSUE_ID" >> "$GITHUB_OUTPUT"
          SAFE_ID=$(echo "$ISSUE_ID" | tr -dc 'a-zA-Z0-9-' | head -c 40)
          echo "branch=fix/firebase-crash-${SAFE_ID}-$(date +%s)" >> "$GITHUB_OUTPUT"

      # ── 5. Create fix branch ──────────────────────────────────────────────
      - name: Create fix branch
        if: steps.crash.outputs.no_issue != 'true'
        run: git checkout -b "${{ steps.crash.outputs.branch }}"

      # ── 6. Fetch crash details from Firebase Crashlytics ──────────────────
      - name: Fetch crash details from Firebase
        if: steps.crash.outputs.no_issue != 'true'
        env:
          GOOGLE_SERVICE_ACCOUNT_JSON: ${{ secrets.GOOGLE_SERVICE_ACCOUNT_JSON }}
          CRASH_ISSUE_ID: ${{ steps.crash.outputs.issue_id }}
        run: python .github/scripts/fetch_crash.py

      # ── 7. Analyze crash and apply fix with Claude ────────────────────────
      - name: Analyze and fix with Claude
        if: steps.crash.outputs.no_issue != 'true'
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
          CRASH_ISSUE_ID: ${{ steps.crash.outputs.issue_id }}
        run: python .github/scripts/fix_crash.py

      # ── 8. Verify build compiles ──────────────────────────────────────────
      - name: Verify build
        id: build
        if: steps.crash.outputs.no_issue != 'true'
        continue-on-error: true
        run: |
          chmod +x gradlew
          ./gradlew :app:compileDebugKotlin --no-daemon 2>&1 | tail -10

      # ── 9. Commit ─────────────────────────────────────────────────────────
      - name: Commit fix
        id: commit
        if: steps.crash.outputs.no_issue != 'true'
        run: |
          git config user.name  "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -A

          if git diff --staged --quiet; then
            echo "no_changes=true" >> "$GITHUB_OUTPUT"
            echo "⚠️  Claude found no code changes to apply."
          else
            TITLE=$(cat crash_title.txt 2>/dev/null || echo "${{ steps.crash.outputs.issue_id }}")
            COMMIT_MSG=$(printf 'fix: resolve Firebase crash %s\n\n%s\n\nAuto-analyzed and fixed by Claude AI.\nFirebase Issue ID: %s' \
              "${{ steps.crash.outputs.issue_id }}" \
              "$TITLE" \
              "${{ steps.crash.outputs.issue_id }}")
            git commit -m "$COMMIT_MSG"
          fi

      # ── 10. Push branch ───────────────────────────────────────────────────
      - name: Push branch
        if: steps.crash.outputs.no_issue != 'true' && steps.commit.outputs.no_changes != 'true'
        run: git push origin "${{ steps.crash.outputs.branch }}"

      # ── 11. Open Pull Request ─────────────────────────────────────────────
      - name: Create Pull Request
        if: steps.crash.outputs.no_issue != 'true' && steps.commit.outputs.no_changes != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TITLE=$(cat crash_title.txt 2>/dev/null || echo "${{ steps.crash.outputs.issue_id }}")
          SUMMARY=$(cat fix_summary.md 2>/dev/null || echo "_No summary generated._")
          STACKTRACE=$(cat crash_stacktrace.txt 2>/dev/null || echo "_Stacktrace unavailable._")

          BUILD_BADGE="✅ Compiles successfully"
          if [ "${{ steps.build.outcome }}" != "success" ]; then
            BUILD_BADGE="⚠️ Build check failed — manual review required before merging"
          fi

          {
            echo "## Firebase Crash Auto-Fix"
            echo ""
            echo "**Firebase Issue ID:** \`${{ steps.crash.outputs.issue_id }}\`"
            echo "**Crash:** ${TITLE}"
            echo "**Base branch:** \`main\`"
            echo "**Build:** ${BUILD_BADGE}"
            echo ""
            echo "---"
            echo ""
            echo "### Stacktrace"
            echo '```'
            echo "${STACKTRACE}"
            echo '```'
            echo ""
            echo "---"
            echo ""
            echo "### Claude's Analysis & Fix"
            echo "${SUMMARY}"
            echo ""
            echo "---"
            echo ""
            echo "🤖 Auto-generated by [Claude](https://claude.ai) via GitHub Actions"
          } > pr_body.md

          gh pr create \
            --title "fix: Firebase crash — ${TITLE}" \
            --base main \
            --head "${{ steps.crash.outputs.branch }}" \
            --body-file pr_body.md
